name: taliem
description: Compagnon pédagogique pour l'apprentissage de la lecture arabe et la mémorisation du Coran.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^13.2.1

  # Network
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Local storage (mobile only — web uses API directly)
  drift: ^2.17.0
  sqlite3_flutter_libs: ^0.5.22
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3

  # UI / Fonts
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

  # Audio
  audioplayers: ^6.1.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.9
  drift_dev: ^2.17.0
  riverpod_generator: ^2.3.11
  freezed: ^2.4.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/articulation/
    - assets/images/gemini/
